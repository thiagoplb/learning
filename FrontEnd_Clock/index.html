<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="clock-container">
    <div class="time-box">
      <span id="display-hour" class="number">00</span>
      <span class="label">Hour</span>
    </div>
    
    <div class="time-box">
      <span id="display-minute" class="number">00</span>
      <span class="label">Minute</span>
    </div>
    
    <div class="time-box">
      <span id="display-second" class="number">00</span>
      <span class="label">Second</span>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
