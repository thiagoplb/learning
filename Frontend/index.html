<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <form>
            <h1>Login</h1>
            <div class="input-box">
                <input type="text" placeholder="Username" required/>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required/>
            </div>
            <div class="remember-forgot" title="Teste"> 
                <label>
                <input type="checkbox"/>
                Remember me
                </label>
                <a href="https://www.google.com" target="_blank">Forgot Password</a>    
            </div>
            <button type="submit">
                Login
            </button>
            <div class="register-link">
                <p>Don't have an account? 
                    <a href="https://www.youtube.com" target="_blank">Register</a>
                </p>
            </div>
            
        </form>
    </div>    
</body>
</html>
